name: Package Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build extension archive
        run: git archive --format=zip --prefix=PyRebar.extension/ -o PyRebar.extension.zip HEAD

      - name: Upload release asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ github.event.release.tag_name }}" PyRebar.extension.zip --clobber
